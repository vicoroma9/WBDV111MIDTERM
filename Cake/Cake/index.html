<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pablo's Delight</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#175a61);
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    position: sticky;
    top: 0;
}

nav button {
    margin: 5px;
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.4);
    cursor: pointer;
}

nav button:hover {
    background: #ff69b4;
    color: white;
}

/* SECTIONS */
section {
    padding: 20px;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

/* CARD */
.card {
    width: 180px;
    padding: 10px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.3);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 15px;
}

button.add {
    margin-top: 8px;
    padding: 6px;
    border-radius: 10px;
    border: none;
    background: #002e33;
    color: white;
    cursor: pointer;
}

/* CART */
#cartItems {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 20px;
}

/* LOGIN */
.login-box {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 20px;
    width: 250px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<header>
    <h2>🍰 Pablo's Delight</h2>
    <nav>
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('shop')">Shop</button>
        <button onclick="showPage('cart')">Cart (<span id="count">0</span>)</button>
        <button onclick="showPage('login')">Login</button>
        <button onclick="logout()">Logout</button>
    </nav>
</header>

<!-- HOME -->
<section id="home">
    <h2>Our Cakes</h2>
    <div class="grid" id="cakeList"></div>
</section>

<!-- SHOP -->
<section id="shop" style="display:none;">
    <h2>Shop</h2>
    <div class="grid" id="shopList"></div>
</section>

<!-- CART -->
<section id="cart" style="display:none;">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
</section>

<!-- LOGIN -->
<section id="login" style="display:none;">
    <div class="login-box">
        <h3>Login</h3>
        <input id="user" placeholder="Username"><br>
        <input id="pass" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg"></p>
    </div>
</section>

<script>
const cakes = [
    {
        name: "Blueberry Cheesecake",
        price: 795,
        img: "blueberry.jpg"
    },
    {
        name: "Choco Overload Cake",
        price: 690,
        img: "Choco.jpg"
    },
    {
        name: "Hazelnut Fudge Cake",
        price: 1025,
        img: "Hazelnut.jpg"
    },
    {
        name: "Mango Bravo Cake",
        price: 1695,
        img: "Mango.jpg"
    },
    {
        name: "Tiramisu Cake",
        price: 845,
        img: "Tiramisu.jpg"
    }
]

let cart = [];
let isLoggedIn = false;

/* DISPLAY */
function displayCakes() {
    const home = document.getElementById("cakeList");
    const shop = document.getElementById("shopList");

    home.innerHTML = "";
    shop.innerHTML = "";

    cakes.forEach((cake, index) => {
        let card = `
        <div class="card">
            <img src="${cake.img}">
            <h4>${cake.name}</h4>
            <p>₱${cake.price}</p>
            <button class="add" onclick="addToCart(${index})">Add</button>
        </div>`;
        home.innerHTML += card;
        shop.innerHTML += card;
    });
}

/* ADD TO CART */
function addToCart(index) {
    if(!isLoggedIn){
        alert("Login muna bago mag order!");
        showPage('login');
        return;
    }

    cart.push(cakes[index]);
    updateCart();
}

/* UPDATE CART */
function updateCart() {
    const cartDiv = document.getElementById("cartItems");
    const count = document.getElementById("count");

    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        cartDiv.innerHTML += `
        <p>${item.name} - $${item.price}
        <button onclick="removeItem(${index})">X</button></p>`;
    });

    cartDiv.innerHTML += `<h3>Total: $${total}</h3>`;
    count.innerText = cart.length;
}

/* REMOVE */
function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
}

/* NAVIGATION */
function showPage(page) {
    document.querySelectorAll("section").forEach(sec => sec.style.display="none");
    document.getElementById(page).style.display="block";
}

/* LOGIN */
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "admin" && pass === "1234"){
        isLoggedIn = true;
        document.getElementById("loginMsg").innerText = "Login successful!";
        alert("Welcome!");
        showPage('home');
    } else {
        document.getElementById("loginMsg").innerText = "Wrong credentials";
    }
}

/* LOGOUT */
function logout() {
    isLoggedIn = false;
    alert("Logged out!");
}

/* INIT */
displayCakes();
</script>

</body>
</html>
