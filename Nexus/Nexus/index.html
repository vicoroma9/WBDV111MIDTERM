<!DOCTYPE html>
<html>
<head>
  <title>Nexus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
// protect homepage: redirect to login if not logged in
if(localStorage.getItem("login") !== "true") {
  alert("Please log in first!");
  window.location.href = "login.html";
}
</script>

<header>
  <h1 class="logo">NEXUS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<section class="hero">
  <h1>WELCOME TO NEXUS EVENT 2026</h1>
  <p>Future of Technology & Innovation</p>
  <button onclick="goEvents()">Get Tickets</button>
</section>

<script>
// logout function
function logout() {
  localStorage.removeItem("login");
  window.location.href = "login.html";
}

// navigate to events
function goEvents() {
  window.location.href = "events.html";
}
</script>
</body>
</html>
