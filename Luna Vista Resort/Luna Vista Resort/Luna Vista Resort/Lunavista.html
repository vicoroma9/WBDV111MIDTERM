<!DOCTYPE html>
<html>
<head>

<title>Luna Vista Resort</title>

<style>

body{
margin:0;
font-family:Arial;
}

/* Navbar */

header{
position:fixed;
width:100%;
background:rgba(0,0,0,0.5);
padding:15px;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
cursor:pointer;
}

/* Carousel */

.carousel{
height:100vh;
overflow:hidden;
}

.slides{
display:flex;
width:300%;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:100vh;
object-fit:cover;
}

@keyframes slide{

0%{margin-left:0}
30%{margin-left:0}

35%{margin-left:-100%}
65%{margin-left:-100%}

70%{margin-left:-200%}
100%{margin-left:-200%}

}

/* Rooms */

.rooms{
padding:80px;
display:flex;
justify-content:center;
gap:30px;
background:#f4f4f4;
}

.room{
background:white;
width:250px;
padding:15px;
text-align:center;
cursor:pointer;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.room img{
width:100%;
border-radius:8px;
}

/* Popup */

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:400px;
padding:20px;
border-radius:10px;
z-index:1001;
}

.popup input, .popup select{
width:100%;
padding:8px;
margin-top:5px;
}

.popup button{
margin-top:10px;
padding:10px;
border:none;
background:teal;
color:white;
width:100%;
cursor:pointer;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:1000;
}

</style>

</head>

<body>

<header>

<nav>

<h2 style="color:white;">Luna Vista Hotel</h2>

<div>
<a onclick="showLogin()">Login</a>
<a href="#rooms">Rooms</a>
</div>

</nav>

</header>

<!-- Carousel -->

<div class="carousel">

<div class="slides">

<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">

</div>

</div>



<section class="rooms" id="rooms">

<div class="room" onclick="openReserve('Deluxe Room')">

<img src="deluxe.jpg">
<h3>Deluxe Room</h3>
<p>$150 / night</p>

</div>

<div class="room" onclick="openReserve('Family Room')">

<img src="family.jpg">
<h3>Family Room</h3>
<p>$200 / night</p>

</div>

<div class="room" onclick="openReserve('Suite Room')">

<img src="suite.jpg">
<h3>Suite Room</h3>
<p>$300 / night</p>

</div>

</section>

<div class="overlay" id="overlay" onclick="closePopup()"></div>



<div class="popup" id="login">

<h2>Login</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>



<div class="popup" id="reserve">

<h2>Room Reservation</h2>

<p id="roomName"></p>

<label>Check In</label>
<input type="date">

<label>Check Out</label>
<input type="date">

<button onclick="reserve()">Confirm Reservation</button>

</div>

<script>

let loggedIn=false

function showLogin(){

document.getElementById("overlay").style.display="block"
document.getElementById("login").style.display="block"

}

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user=="vicoroma9@gmail.com" && pass=="vicoroma"){

loggedIn=true
alert("Login Successful!")
closePopup()

}else{

alert("Wrong login")

}

}

function openReserve(room){

if(!loggedIn){

alert("Please login first")
showLogin()
return

}

document.getElementById("overlay").style.display="block"
document.getElementById("reserve").style.display="block"
document.getElementById("roomName").innerText=room

}

function reserve(){

alert("Reservation Confirmed!")
closePopup()

}

function closePopup(){

document.getElementById("overlay").style.display="none"
document.getElementById("login").style.display="none"
document.getElementById("reserve").style.display="Thank you"

}

</script>

</body>
</html>
