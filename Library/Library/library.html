<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibryConnect</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');
    background-size: cover;
    color: #f5f1e3;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 35px;
}

nav {
    text-align: center;
}

button {
    background: #5a3e2b;
    color: white;
    border: 2px solid #c4a484;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #8b5e3c;
}

.books {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.book {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    width: 150px;
    border-radius: 10px;
    text-align: center;
}

.book img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.section {
    display: none;
    text-align: center;
}

ul {
    list-style: none;
    padding: 0;
}
</style>
</head>

<body>

<header>📚 LibraryConnect</header>

<nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('loans')">Loans</button>
</nav>

<!-- HOME -->
<div id="home" class="section" style="display:block;">
    <h2>Available Books</h2>
    <div class="books" id="bookList"></div>
</div>

<!-- LOANS -->
<div id="loans" class="section">
    <h2>Borrowed Books</h2>
    <ul id="loanList"></ul>
</div>

<script>
let books = [
    {
        title: "Twilight",
        img: "twilight.jpg",
        borrowed: false
    },
    {
        title: "New Moon",
        img: "newmoon.jpg",
        borrowed: false
    },
    {
        title: "Eclipse",
        img: "eclipse.jpg",
        borrowed: false
    }
];

// SHOW SECTION
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

// DISPLAY BOOKS
function displayBooks() {
    const container = document.getElementById("bookList");
    container.innerHTML = "";

    books.forEach((book, index) => {
        if (!book.borrowed) {
            container.innerHTML += `
                <div class="book">
                    <img src="${book.img}">
                    <h4>${book.title}</h4>
                    <button onclick="borrowBook(${index})">Borrow</button>
                </div>
            `;
        }
    });
}

// BORROW BOOK
function borrowBook(index) {
    books[index].borrowed = true;
    displayBooks();
    updateLoans();
}

// UPDATE LOANS
function updateLoans() {
    const list = document.getElementById("loanList");
    list.innerHTML = "";

    books.forEach((book, index) => {
        if (book.borrowed) {
            list.innerHTML += `
                <li>
                    ${book.title}
                    <button onclick="returnBook(${index})">Return</button>
                </li>
            `;
        }
    });
}

// RETURN BOOK
function returnBook(index) {
    books[index].borrowed = false;
    displayBooks();
    updateLoans();
}

// INITIAL LOAD
displayBooks();
updateLoans();
</script>

</body>
</html>
